<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azan Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            display: inline-block;
        }
        
        .status-item {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕌 Azan Dashboard</h1>
        <p class="subtitle">Prayer Time Management System</p>
        <div class="status">
            <div class="status-item">✅ Server is running</div>
            <div class="status-item">🚀 Phase 0: Project Initialization Complete</div>
            <div class="status-item" id="timestamp"></div>
        </div>
    </div>
    
    <script>
        // Display current timestamp
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                `⏰ ${now.toLocaleTimeString()} - ${now.toLocaleDateString()}`;
        }
        
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
        
        // Test API health endpoint
        fetch('/api/health')
            .then(response => response.json())
            .then(data => console.log('API Health Check:', data))
            .catch(error => console.error('API Error:', error));
    </script>
</body>
</html>
