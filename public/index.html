<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azan Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Overlay -->
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p>Loading Prayer Times...</p>
        </div>

        <div class="dashboard-container">
            <!-- Left Panel: Schedule -->
            <div class="panel schedule-panel">
                <table id="prayer-table">
                    <thead>
                        <tr>
                            <th>Prayer</th>
                            <th>Start</th>
                            <th>Iqamah</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Right Panel: Focus -->
            <div class="panel focus-panel">
                <div class="clock-container">
                    <div id="digital-clock" class="digital-clock">--:--:--</div>
                    <div id="date-display" class="date-display">...</div>
                </div>
                
                <div class="countdown-container">
                    <div class="next-label">Next is <span id="next-name" class="next-name">...</span></div>
                    <div id="countdown-timer" class="countdown-timer">--:--:--</div>
                </div>
                
                <div id="status-indicator" class="status-indicator" title="Offline / Error"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/vendor/luxon.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
