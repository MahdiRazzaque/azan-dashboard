name: Docker Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker Buildx (required for advanced caching and multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image using the context of the root directory (.)
      # but points to the specific Dockerfile in the docker/ directory.
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false # We only want to verify the build succeeds, not push to Docker Hub
          tags: azan-dashboard:test
          cache-from: type=gha
          cache-to: type=gha,mode=max