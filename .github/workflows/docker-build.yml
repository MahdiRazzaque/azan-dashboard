name: Deploy Multiple Instances

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # We use 'include' to create specific pairs of Path + Port
        include:
          - project_path: "/home/ubuntu/azan-dashboard.home.kg"
            app_port: 3010
          - project_path: "/home/ubuntu/azan.home.kg"
            app_port: 3005

    steps:
      - name: Deploy to ${{ matrix.project_path }} on Port ${{ matrix.app_port }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "🚀 Starting deployment for: ${{ matrix.project_path }} on Port ${{ matrix.app_port }}"
            
            # 1. Navigate to the folder
            cd ${{ matrix.project_path }}

            # 2. Fetch and Reset
            git fetch origin main
            git reset --hard origin/main

            # 3. Create/Update .env file for Docker Compose variables
            # This ensures the port sticks even if you restart the server manually later
            echo "APP_PORT=${{ matrix.app_port }}" > .env

            # 4. Build & Up
            # Docker Compose automatically reads the .env file we just created
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.audio.yml up -d --build

            # 5. Cleanup & Reload Nginx
            docker image prune -f
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"