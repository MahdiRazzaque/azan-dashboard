name: Docker Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sets up Docker Buildx (required for advanced caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the image and caches layers to GitHub Actions
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # We only want to test the build, not push to a registry
          tags: my-app-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max