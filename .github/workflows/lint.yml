name: Linting

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.config/eslint*'
      - '.github/workflows/lint.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
