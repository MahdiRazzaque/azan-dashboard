name: Deploy Multiple Instances

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:          
          - project_path: "/home/ubuntu/azan.home.kg"
            app_port: 3005
            project_name: "azan-dashboard-1"
            base_url: "https://azan.home.kg"

          - project_path: "/home/ubuntu/azan-dashboard.home.kg"
            app_port: 3010
            project_name: "azan-dashboard-2"
            base_url: "https://azan-dashboard.home.kg"

    steps:
      - name: Deploy to ${{ matrix.project_path }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Stop on error
            set -e
            
            echo "🚀 Starting deployment for: ${{ matrix.project_path }} on Port ${{ matrix.app_port }}"
            
            # 1. Navigate
            cd ${{ matrix.project_path }}

            # 2. FIX GIT LOCKS
            if [ -f .git/index.lock ]; then rm -f .git/index.lock; fi
            if [ -f .git/refs/remotes/origin/main.lock ]; then rm -f .git/refs/remotes/origin/main.lock; fi

            # 3. Fetch and Reset
            git fetch origin main
            git reset --hard origin/main

            # 4. Persist Environment Variables
            touch .env
            sed -i '/^APP_PORT=/d' .env
            echo "APP_PORT=${{ matrix.app_port }}" >> .env
            
            sed -i '/^COMPOSE_PROJECT_NAME=/d' .env
            echo "COMPOSE_PROJECT_NAME=${{ matrix.project_name }}" >> .env

            # Update App Config
            mkdir -p config
            touch config/.env
            sed -i '/^BASE_URL=/d' config/.env
            echo "BASE_URL=${{ matrix.base_url }}" >> config/.env

            # 5. Deploy (Updated Command)
            docker compose --env-file .env -p ${{ matrix.project_name }} -f docker/docker-compose.yml -f docker/docker-compose.audio.yml up -d --build

            # 6. Cleanup & Reload Nginx
            docker image prune -f
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"