name: Deploy Multiple Instances

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Stop on error
            set -e
            
            echo "🚀 Starting deployment"
            
            # 1. Navigate
            cd ${{ secrets.PROJECT_PATH }}

            # 2. FIX GIT LOCKS
            if [ -f .git/index.lock ]; then rm -f .git/index.lock; fi
            if [ -f .git/refs/remotes/origin/main.lock ]; then rm -f .git/refs/remotes/origin/main.lock; fi

            # 3. Fetch and Reset
            git fetch origin main
            git reset --hard origin/main

            # 4. Persist Environment Variables
            touch .env
            sed -i '/^APP_PORT=/d' .env
            echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env
            
            sed -i '/^COMPOSE_PROJECT_NAME=/d' .env
            echo "COMPOSE_PROJECT_NAME=${{ secrets.COMPOSE_PROJECT_NAME }}" >> .env

            # Update App Config
            mkdir -p config
            touch config/.env
            sed -i '/^BASE_URL=/d' config/.env
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> config/.env

            # 5. Deploy
            docker compose --env-file .env -p ${{ secrets.COMPOSE_PROJECT_NAME }} -f docker/docker-compose.yml -f docker/docker-compose.audio.yml up -d --build

            # 6. Cleanup & Reload Nginx
            docker image prune -f
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"